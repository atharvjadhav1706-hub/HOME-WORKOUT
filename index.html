<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Apex Forge | Blitz & Bulk</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* ── TOKENS (COMPULSORY DARK THEME) ── */
:root { 
    --bg: #050507; 
    --surface: rgba(20, 20, 28, 0.6); 
    --surface2: rgba(255, 255, 255, 0.06); 
    --border: rgba(255, 255, 255, 0.08); 
    --border2: rgba(255, 255, 255, 0.15); 
    --tx: #f4f4f8; 
    --tx2: #9E9A93; 
    --tx3: #6A6763; 
    --mu: #8a8a9d;
    --acc: #E8622A; 
    --acc2: #2A8FE8; 
    --green: #00d26a; 
    --green-bg: rgba(0, 210, 106, 0.15); 
    --gold: #facc15; 
    --gold-bg: rgba(250, 204, 21, 0.1); 
    --neon-green: #39FF14; 
    --cyan: #00d0f4;
    --tb: rgba(255, 255, 255, 0.08);
    --panel: #111116;
    --shadow-sm: 0 8px 24px 0 rgba(0, 0, 0, 0.4); 
    --shadow-md: 0 12px 40px 0 rgba(0, 0, 0, 0.6); 
    --glass-blur: blur(30px); 
    --r-sm: 12px; 
    --r-md: 16px; 
    --r-lg: 24px; 
    --safe: env(safe-area-inset-bottom, 0px); 
    --font-head: 'Syne', 'Poppins', sans-serif; 
    --font-body: 'Inter', sans-serif; 
    --font-mono: 'JetBrains Mono', 'Space Mono', monospace; 
}

/* ── STRICT PURE-CSS ANTI PULL-TO-REFRESH ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

html,body{
    width:100vw; height:100dvh; 
    overflow:hidden !important;
    position:fixed; inset:0;
    font-family:var(--font-body); background:var(--bg); color:var(--tx); 
    overscroll-behavior:none; 
    touch-action:none;
}

::-webkit-scrollbar{display:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}

/* ── AMBIENT BACKGROUND BLOBS ── */
.bg-blobs { position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none; }
.blob { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.6; animation:floatBlob 12s infinite alternate ease-in-out; }
.blob1 { width:40vw; height:40vw; background:rgba(42,143,232,0.15); top:-10%; left:-10%; }
.blob2 { width:50vw; height:50vw; background:rgba(232,98,42,0.1); bottom:-10%; right:-10%; animation-delay:-4s; animation-duration:15s; }
.blob3 { width:35vw; height:35vw; background:rgba(28,153,85,0.1); top:30%; left:60%; animation-delay:-7s; animation-duration:18s; }
@keyframes floatBlob { 0% { transform:translate(0,0) scale(1) rotate(0deg); } 100% { transform:translate(40px,60px) scale(1.15) rotate(15deg); } }

.glass-panel { background:var(--surface); backdrop-filter:var(--glass-blur); -webkit-backdrop-filter:var(--glass-blur); border:1px solid var(--border); box-shadow:var(--shadow-sm); }
.app{width:100%;max-width:1000px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;position:relative;}

/* ── SCROLLING CONTAINER ── */
.vc{
    flex:1; overflow-y:auto; overflow-x:hidden; 
    padding:0 16px calc(120px + var(--safe)); position:relative; z-index:10; 
    scroll-behavior:smooth; 
    overscroll-behavior-y:contain; 
    -webkit-overflow-scrolling:touch; 
    touch-action:pan-y;
}
.view{display:none;} .view.active{display:block;animation:fadeUp .4s cubic-bezier(.16,1,.3,1);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}

/* ── SCROLLING TOP BAR ── */
.top-bar { display:flex; align-items:center; justify-content:space-between; padding:calc(12px + env(safe-area-inset-top,0px)) 0 16px; max-width:480px; margin:0 auto; position:relative;}
.tbtn { height:40px; border-radius:100px; background:var(--surface); border:1px solid var(--border); color:var(--tx); display:flex; align-items:center; justify-content:center; transition:all .2s; backdrop-filter:var(--glass-blur); box-shadow:var(--shadow-sm); font-family:var(--font-mono); font-size:12px; font-weight:700; cursor:pointer;}
.tbtn:active { transform:scale(.92); }
.tbtn.icon-only { width:40px; padding:0; border-radius:50%; }
.tbtn.text-btn { padding:0 14px; font-size: 13px; }
.tbtn svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
#btnBack { opacity:0; pointer-events:none; transform:translateX(-8px); transition:all .25s; position:absolute; left:0; }
#btnBack.on { opacity:1; pointer-events:auto; transform:none; position:relative; }
.app-title-mini { font-family:var(--font-head); font-weight:800; font-size:14px; letter-spacing:1px; text-transform:uppercase; color:var(--tx2); flex:1; text-align:left; margin-left:4px; transition:margin 0.2s;}
#btnBack.on + .app-title-mini { margin-left:12px; }

/* ── COMPONENTS ── */
.three-boxes { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-bottom:24px; }
.stat-box { border-radius:var(--r-md); padding:16px 8px; display:flex; flex-direction:column; align-items:center; cursor:pointer; transition: transform 0.2s; }
.stat-box:active { transform:scale(0.96); }
.sb-val { font-family:var(--font-head); font-size:22px; font-weight:800; display:flex; align-items:baseline; gap:3px; }
.sb-unit { font-size:11px; font-weight:700; color:var(--tx3); text-transform:uppercase; }
.sb-lbl { font-size:10px; font-weight:700; color:var(--tx2); text-transform:uppercase; margin-top:6px; text-align:center; line-height:1.2; }

/* ── DUAL RING HERO DASHBOARD ── */
.hero-dashboard { 
    display:flex; 
    flex-direction: row; 
    align-items:center; 
    justify-content:space-between; 
    padding: 12px 12px 12px 24px; 
    border-radius: 30px 130px 130px 30px; 
    margin-bottom:24px; 
    gap: 16px; 
    background: linear-gradient(145deg, rgba(20,20,28,0.7), rgba(5,5,8,0.9));
    box-shadow: inset 0 4px 25px rgba(0,0,0,0.8), var(--shadow-sm); 
    border: 1px solid var(--border);
    backdrop-filter: var(--glass-blur); 
    -webkit-backdrop-filter: var(--glass-blur);
}

/* Vertical Left Day HUD Layout */
.hero-day-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 220px; 
    width: 80px; 
    flex-shrink: 0;
}

/* ── INTRICATE GEOMETRIC SVG BACKGROUND ── */
.hud-bg {
    position: absolute;
    inset: -15px -10px;
    pointer-events: none;
    z-index: 1;
}
.hud-bg svg {
    width: 100%;
    height: 100%;
    display: block;
}

/* ── STYLIZED DAY FONT ── */
.hero-day-name {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-family: var(--font-head); 
    font-weight: 800;
    font-size: 21px; /* Scaled perfectly to fit longest day inside box */
    color: #ffffff;
    letter-spacing: 4px; /* Reduced spacing to prevent box overflow */
    text-transform: uppercase;
    position: relative;
    z-index: 2;
    -webkit-text-stroke: 1px var(--cyan);
    text-shadow: 
      0 0 15px var(--cyan), 
      0 0 35px rgba(0, 208, 244, 0.6),
      2px 4px 10px rgba(0, 0, 0, 0.9);
    white-space: nowrap;
}

/* Uplifted Ring Wrap */
.triple-ring-wrap { 
    position:relative; 
    width:220px; 
    height:220px; 
    flex-shrink:0; 
    filter: drop-shadow(-10px 15px 20px rgba(0,0,0,0.85)) drop-shadow(0px 0px 10px rgba(0, 208, 244, 0.2)); 
    transform: translateZ(0); 
}
.dash-svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); overflow: visible; }
.ring-track { fill: none; stroke: var(--tb); stroke-width: 8; }
.ring-prog { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.8s cubic-bezier(.16,1,.3,1); }

/* Orbiting Day Nodes */
.day-node { position: absolute; width: 28px; height: 28px; border-radius: 50%; background: var(--panel); border: 2px solid var(--tb); display: flex; flex-direction: column; align-items: center; justify-content: center; transform: translate(-50%, -50%); z-index: 10; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
.day-node .date-val { font-family: var(--font-mono); font-size: 0.65rem; font-weight: 800; color: var(--mu); }
.day-node .day-out { position: absolute; font-family: var(--font-head); font-size: 0.65rem; font-weight: 800; color: var(--mu); }

.day-node.active { background: var(--tx); border-color: var(--cyan); box-shadow: 0 0 12px rgba(0,208,244,0.4); transform: translate(-50%, -50%) scale(1.2); z-index: 11; }
.day-node.active .date-val { color: var(--bg); }
.day-node.active .day-out { color: var(--cyan); }
.day-node.done { background: var(--green); border-color: var(--green); }
.day-node.done .date-val { color: #fff; }

.sec-head{display:flex;justify-content:space-between;align-items:center;margin:32px 0 12px; border-bottom:1px solid var(--border2); padding-bottom:8px;}
.sec-title{font-family:var(--font-head);font-size:15px;font-weight:800;color:var(--tx2);text-transform:uppercase; letter-spacing:0.5px;}

/* ── WORKOUT CARDS ── */
.wcard{ display:flex;align-items:center;gap:14px; border-radius:var(--r-md); padding:16px; margin-bottom:12px; cursor:pointer; transition:all .2s; position:relative; overflow:hidden; animation:fadeUp .4s forwards; background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow-sm); }
.wcard.done{opacity:.75; border-color:rgba(0,210,106,0.3); transform:scale(0.98); box-shadow:none;}
.wcard.done .wcard-name{color:var(--tx3);}
.wcard.done .wcard-icon{background:rgba(0,210,106,0.1); color:var(--green);}
.wcard-icon{width:46px;height:46px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:20px; background:var(--surface2); color:var(--accent-color);}
.wcard-body{flex:1;min-width:0;z-index:2;}
.wcard-tag{font-size:10px;font-weight:700;color:var(--accent-color);text-transform:uppercase;font-family:var(--font-mono);margin-bottom:4px;}
.wcard-name{font-family:var(--font-head);font-size:16px;font-weight:700;}
.wcard-val{font-family:var(--font-mono);font-size:13px;color:var(--tx2);margin-top:6px; font-weight:700;}
.wcard::after { content:attr(data-val); position:absolute; right:-5px; bottom:-15px; font-size:6.5rem; font-weight:800; color:var(--tx); opacity:0.04; font-family:var(--font-mono); pointer-events:none; z-index:0; letter-spacing:-4px; }

.wcard-timer{ margin-top:10px; background:var(--tx); padding:8px 16px; border-radius:100px; font-weight:700; font-family:var(--font-mono); color:var(--bg); font-size:13px; display:inline-flex; align-items:center; gap:8px; pointer-events:auto; z-index:10; border:none; cursor:pointer;}
.wcard-timer svg { width:16px; height:16px; fill:currentColor; }
.wcard-timer.running { background:var(--gold); color:#000; box-shadow:0 0 20px rgba(250,204,21,0.6); }
.cancel-timer-btn { display:inline-flex; align-items:center; justify-content:center; margin-left:8px; background:rgba(0,0,0,0.15); width:24px; height:24px; border-radius:50%; }
.cancel-timer-btn svg { width:12px; height:12px; stroke:#000; fill:none; }
.wcard.done .wcard-timer{display:none;}

/* ── CHECKBOX ── */
.chkbox { width:30px; height:30px; border-radius:50%; border:2px solid rgba(128,128,153,0.3); display:flex; align-items:center; justify-content:center; transition:all 0.3s; position:relative; z-index:10; background:transparent;}
.chkbox svg { width:15px; height:15px; stroke-width:4; stroke:var(--bg); fill:none; transform:scale(0.5); opacity:0; transition:all 0.3s; }
.wcard.done .chkbox { background:var(--green)!important; border-color:var(--green)!important; box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--green)!important; }
.wcard.done .chkbox svg { transform:scale(1); opacity:1; stroke:#000; }

.done-banner{display:none;align-items:center;gap:16px;padding:16px;border-radius:var(--r-md);margin-bottom:20px; background:var(--green-bg); border:1px solid rgba(0,210,106,0.3); animation:fadeUp .4s;}
.done-banner-icon{width:42px;height:42px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center; box-shadow:0 4px 12px rgba(0,210,106,0.3);}
.done-banner-icon svg{width:20px;height:20px;stroke:#000;stroke-width:3;fill:none;}
.done-banner-title{font-family:var(--font-head);font-size:15px;font-weight:700;color:var(--green);}

/* ── CONDENSED PROGRESS VIEW ── */
.prog-hero{border-radius:var(--r-md);padding:16px 20px;margin-bottom:20px; max-width:480px; margin-left:auto; margin-right:auto;}
.prog-hero-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.prog-pct{font-family:var(--font-head);font-size:36px;font-weight:800;letter-spacing:-1px;line-height:1;}
.prog-meta-val{font-family:var(--font-mono);font-size:16px;font-weight:700;color:var(--tx);text-align:right;}
.prog-meta-lbl{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;text-align:right;margin-top:2px;}
.prog-track { height:8px; background:var(--surface2); border-radius:12px; overflow:visible; border:1px solid var(--border2); position:relative; }
.prog-fill { height:100%; background:linear-gradient(90deg, var(--cyan), var(--green), var(--gold)); border-radius:12px; transition:width 1s cubic-bezier(0.16,1,0.3,1); box-shadow:0 0 12px 2px rgba(0,210,106,0.6); position:relative; will-change:width; }
.prog-fill::after { content:''; position:absolute; right:0; top:50%; transform:translateY(-50%); width:6px; height:14px; background:#fff; border-radius:10px; box-shadow:0 0 8px 2px rgba(255,255,255,0.9); }

.subj-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:12px;}
.subj-card{border-radius:var(--r-md);padding:16px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center; background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow-sm);}
.ring-wrap{position:relative;width:76px;height:76px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-pct{font-family:var(--font-mono);font-size:14px;font-weight:700;}
.subj-name{ font-family:var(--font-head); font-size:10px; font-weight:700; text-transform:uppercase; word-break:keep-all;}
.subj-icon-wrap{width:36px;height:36px;border-radius:var(--r-sm);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;}

.detail-top{display:flex;flex-direction:column;align-items:center;padding:24px 0 32px;}
.detail-ring-wrap{position:relative;width:180px;height:180px;margin-bottom:20px;}
.detail-ring-wrap svg{transform:rotate(-90deg);}
.detail-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.detail-cnt{font-family:var(--font-head);font-size:48px;font-weight:800;}
.day-card{display:flex;align-items:center;gap:16px;padding:16px 18px;border-radius:var(--r-md);margin-bottom:12px; background:var(--surface); border:1px solid var(--border);}
.day-card.done{opacity:.5;}
.day-card.today-card{border-color:var(--acc);border-width:2px;}
.day-num-block{text-align:center;padding-right:16px;border-right:1px solid var(--border);min-width:55px;}
.day-num{font-family:var(--font-mono);font-size:26px;font-weight:700;}
.day-mon{font-size:11px;font-weight:700;text-transform:uppercase;}

/* ── BOTTOM NAV ── */
.bnav { position: fixed; bottom: calc(24px + var(--safe)); left: 50%; transform: translateX(-50%); width: max-content; border-radius: 100px; display: flex; padding: 8px; gap: 8px; z-index: 1000; background: rgba(22,22,30,0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
.bb { display: flex; align-items: center; justify-content: center; padding: 12px 30px; border-radius: 100px; color: var(--tx3); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); border: none; background: transparent; cursor: pointer; }
.bb svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2.5; fill: none; transition: all 0.4s; }
.bb.active { color: var(--bg); background: var(--tx); box-shadow: 0 4px 15px rgba(255,255,255,0.1); transform: translateY(-2px); }

/* ── MODALS ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal { width: 100%; max-width: 360px; border-radius: var(--r-lg); padding: 24px; display: flex; flex-direction: column; transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); }
.modal-overlay.active .modal { transform: translateY(0); }
.hist-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border2); }
.hist-item:last-child { border-bottom: none; }
.hist-date { font-size: 13px; font-weight: 600; color: var(--tx2); }
.hist-weight { font-family: var(--font-mono); font-weight: 700; font-size: 15px; color: var(--tx); }

/* ── FUTURISTIC CRUSHED POPUP OVERLAY ── */
.crush-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(5, 5, 8, 0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.4s;
}
.crush-overlay.show { opacity: 1; pointer-events: auto; }

.crush-svg {
    position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none;
}
.crush-line {
    fill: none; stroke: var(--cyan); stroke-linecap: round; stroke-linejoin: round;
    filter: drop-shadow(0 0 8px var(--cyan));
    stroke-dasharray: 2000; stroke-dashoffset: 2000;
}
.crush-overlay.show .crush-line {
    animation: drawCrushLine 1.5s cubic-bezier(0.2, 1, 0.3, 1) forwards;
}
@keyframes drawCrushLine {
    0% { stroke-dashoffset: 2000; opacity: 1; }
    80% { stroke-dashoffset: 0; opacity: 1; }
    100% { stroke-dashoffset: 0; opacity: 0.15; }
}

.crush-text-wrap { position: relative; z-index: 2; text-align: center; }
.crush-text {
    font-family: var(--font-mono); font-size: 3.5rem; font-weight: 800;
    color: transparent; -webkit-text-stroke: 2px rgba(255,255,255,0.8);
    letter-spacing: 4px; line-height: 1.1; text-transform: uppercase;
    opacity: 0; transform: translateY(20px) scale(0.9);
}
.crush-overlay.show .crush-text {
    animation: crushTextIn 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: 0.6s;
}
.crush-text::after {
    content: attr(data-text); position: absolute; left: 0; top: 0; width: 100%; height: 100%;
    color: var(--neon-green); text-shadow: 0 0 25px var(--green);
    -webkit-text-stroke: 0; clip-path: polygon(0 0, 0 0, 0 100%, 0 100%);
}
.crush-overlay.show .crush-text::after {
    animation: crushFill 1s cubic-bezier(0.8, 0, 0.2, 1) forwards;
    animation-delay: 1.2s;
}
@keyframes crushTextIn {
    0% { opacity: 0; transform: translateY(30px) scale(0.9); filter: blur(10px); }
    20% { opacity: 1; transform: translateY(0) scale(1.05); filter: blur(0); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes crushFill {
    0% { clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); }
    100% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
}

#todayContent, .hero-dashboard, .three-boxes, .sec-head { max-width:480px; margin-left:auto; margin-right:auto; }
</style>
</head>
<body>

<div class="bg-blobs"><div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div></div>

<div class="app">
  <div class="vc" id="mainScroll">
    <div class="top-bar" id="appTopBar">
      <button class="tbtn icon-only" id="btnBack" onclick="closeDetail()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="app-title-mini" id="miniTitle"></div>
    </div>

    <div class="view active" id="vT">
      
      <div class="hero-dashboard" id="heroDashboard">
        <div class="hero-day-wrap">
          <div class="hud-bg">
            <svg viewBox="0 0 100 300" preserveAspectRatio="none">
              <polyline points="0,20 20,20 20,60 40,80 40,120 20,140 20,180 40,200 40,240 20,260 20,300" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linejoin="miter"/>
              <polyline points="100,40 80,40 80,80 60,100 60,140 80,160 80,200 60,220 60,260 80,280 80,300" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-linejoin="miter"/>
              <line x1="0" y1="140" x2="10" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
              <line x1="90" y1="180" x2="100" y2="180" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

<script>
'use strict';

const SK = 'apex_data_v63'; 

var DB = { weightHistory: [] };
try { var saved = localStorage.getItem(SK); if (saved) DB = { ...DB, ...JSON.parse(saved) }; } catch(e) {}

if (!DB.weightHistory || DB.weightHistory.length === 0) { 
    DB.weightHistory = [{ d: Date.now(), w: 100.0 }]; 
}

// --- DYNAMIC DATES: LOCKED TO TOMORROW ON FIRST LOAD ---
if (!DB.startDate) {
    let tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    tomorrow.setHours(0, 0, 0, 0);
    DB.startDate = tomorrow.getTime();
    try { localStorage.setItem(SK, JSON.stringify(DB)); } catch(e) {}
}

let DS = new Date(DB.startDate);
let REAL_START = new Date(DS);
let TOTAL = 30; // 30 Day Challenge Fixed Size

const TARGET_DATE = new Date(DS);
TARGET_DATE.setDate(TARGET_DATE.getDate() + TOTAL);
const TARGET_TIMER = new Date(TARGET_DATE);
TARGET_TIMER.setHours(8, 0, 0, 0);

const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DL = ['M','T','W','T','F','S','S']; 
const DL_FULL = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];

var dI = 0, pre = false, detKey = '', GT = { key: null, end: 0 }, gInterval = null, globalAudioCtx = null, cdInterval = null;

function save() { try { localStorage.setItem(SK, JSON.stringify(DB)); } catch(e) {} }

function formatSets(val, unit) {
  if (val <= 0) return '';
  if (unit === 'sec') {
    let sets = Math.ceil(val / 45); 
    if (sets === 1) return `1 set × ${val}s <span style="opacity:0.65; font-weight:600; font-size:11px; margin-left:4px;">[${val}s total]</span>`;
    let base = Math.floor(val / sets), rem = val % sets, arr = [];
    for(let i=0; i<sets; i++) arr.push(base + (i < rem ? 1 : 0));
    return `${sets} sets (${arr.join(', ')}s) <span style="opacity:0.65; font-weight:600; font-size:11px; margin-left:4px;">[${val}s total]</span>`;
  } else {
    let sets = Math.ceil(val / 12); 
    if (sets === 1) return `1 set × ${val} reps <span style="opacity:0.65; font-weight:600; font-size:11px; margin-left:4px;">[${val} total]</span>`;
    let base = Math.floor(val / sets), rem = val % sets, arr = [];
    for(let i=0; i<sets; i++) arr.push(base + (i < rem ? 1 : 0));
    return `${sets} sets (${arr.join(', ')}) <span style="opacity:0.65; font-weight:600; font-size:11px; margin-left:4px;">[${val} total]</span>`;
  }
}

function openWeightModal() {
  renderWeightList();
  document.getElementById('weightModal').classList.add('active');
}
function closeWeightModal() { document.getElementById('weightModal').classList.remove('active'); }

function renderWeightList() {
  var list = document.getElementById('weightList');
  if (DB.weightHistory.length === 0) {
      list.innerHTML = '<div style="color:var(--tx3); font-size:12px; text-align:center; padding:20px 0;">No weight logged yet.</div>';
      return;
  }
  var html = DB.weightHistory.slice().reverse().map(entry => {
      var d = new Date(entry.d);
      var dateStr = MN[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
      var cleanWeight = parseFloat(entry.w).toFixed(1);
      return `<div class="hist-item"><span class="hist-date">${dateStr}</span><span class="hist-weight">${cleanWeight} kg</span></div>`;
  }).join('');
  list.innerHTML = html;
}

function addWeight() {
  var input = document.getElementById('newWeightInput');
  var w = input.value;
  if (w && !isNaN(w) && w.trim() !== "") {
      DB.weightHistory.push({ d: Date.now(), w: parseFloat(w) });
      save(); input.value = ''; renderWeightList(); renderDashboardBox(); 
  }
}

function renderDashboardBox() {
  var currentWeight = DB.weightHistory.length > 0 ? parseFloat(DB.weightHistory[DB.weightHistory.length - 1].w) : 100.0;
  document.getElementById('sbWeight').textContent = currentWeight.toFixed(1);
}

function startLiveCountdown() {
  if (cdInterval) clearInterval(cdInterval);
  var el = document.getElementById('sbRemain');
  var lbl = document.getElementById('sbLblRemain');
  if (!el) return;

  function tick() {
      var now = new Date();
      // If previewing, count down to the exact start (midnight tomorrow)
      var target = pre ? new Date(DS) : TARGET_TIMER; 
      var diff = target - now;

      if(diff <= 0) {
          if (pre) {
              // Challenge just started! Auto-reload to switch out of preview mode
              location.reload(); 
              return;
          }
          el.innerHTML = '<span style="font-size:14px;color:var(--cyan);letter-spacing:1px;">ARRIVED</span>';
          if(lbl) lbl.textContent = 'CHALLENGE COMPLETE';
          return;
      }

      var d = Math.floor(diff / (1000 * 60 * 60 * 24));
      var h = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
      var m = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
      var s = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
      
      el.innerHTML = `${d}<span class="sb-unit" style="margin:0 4px 0 2px;">d</span>${h}:${m}:${s}`;
      if(lbl) {
          lbl.textContent = pre ? 'STARTS IN' : 'UNTIL ' + MN[TARGET_DATE.getMonth()].toUpperCase() + ' ' + TARGET_DATE.getDate();
      }
  }
  tick(); 
  cdInterval = setInterval(tick, 1000);
}

function prog(cd, s, f) { 
    if (f === 0) return 0;
    if (TOTAL <= 1) return f;
    return Math.round(s + (cd / (TOTAL - 1)) * (f - s)); 
}

var W_DATA = [
  {k:'lj', i:'🤸', tg:'WARMUP', n:'Low-Impact Jacks', s:15, f:45, u:'reps'},
  {k:'ac', i:'🔄', tg:'WARMUP', n:'Arm Circles', s:20, f:50, u:'reps'},
  {k:'csq', i:'🪑', tg:'LOWER BODY', n:'Deep Squats', s:10, f:60, u:'reps'}, 
  {k:'rl', i:'🚶', tg:'LOWER BODY', n:'Reverse Lunges', s:8, f:24, u:'reps'},
  {k:'js', i:'🚀', tg:'LOWER BODY', n:'Jump Squats', s:4, f:20, u:'reps'}, 
  {k:'pu', i:'💪', tg:'UPPER BODY', n:'Standard Push-Ups', s:5, f:30, u:'reps'}, 
  {k:'bcp', i:'💥', tg:'UPPER BODY', n:'Band Chest Press', s:15, f:60, u:'reps'}, 
  {k:'sm', i:'🦸', tg:'UPPER BODY', n:'Supermans (Back)', s:5, f:20, u:'reps'},
  {k:'bbc', i:'🏋️', tg:'ARMS', n:'Band Bicep Curls', s:15, f:60, u:'reps'},
  {k:'bte', i:'⚡', tg:'ARMS', n:'Band Tricep Ext.', s:15, f:60, u:'reps'},
  {k:'hg', i:'🗜️', tg:'ARMS', n:'Hand Gripper Crush', s:20, f:100, u:'reps'},
  {k:'pl', i:'🪵', tg:'CORE', n:'Forearm Plank', s:15, f:120, u:'sec'},
  {k:'rt', i:'🌪️', tg:'CORE', n:'Russian Twists', s:12, f:40, u:'reps'},
  {k:'mc', i:'🧗', tg:'FINISHER', n:'Mountain Climbers', s:10, f:60, u:'reps'}, 
  {k:'bp', i:'🔥', tg:'FINISHER', n:'Burpees', s:1, f:10, u:'reps'} 
];

function getWorkoutData(cd) { 
  return W_DATA.map(x=>{
    var val = prog(cd, x.s, x.f);
    return {k:x.k, icon:x.i, tag:x.tg, name:x.n, val:val, disp:formatSets(val, x.u), unit:x.u};
  }).filter(t=>t.val>0);
}
function getAllTasksForDay(cd, dObj) { 
  var dStr = dObj.getFullYear() + '_' + dObj.getMonth() + '_' + dObj.getDate();
  return getWorkoutData(cd).map(t=>({...t, k:t.k+'_'+dStr, type:'workout'})); 
}

function init() {
  var now = new Date(); now.setHours(0,0,0,0);
  var start = new Date(DS); start.setHours(0,0,0,0);
  var raw = Math.round((now - start) / 86400000);
  
  pre = raw < 0; 
  dI = pre ? 0 : Math.min(Math.max(raw, 0), TOTAL - 1);
}

function drawWeek() {
  var el = document.getElementById('weekNodesEl');
  if(!el) return;
  el.innerHTML = '';

  var now = new Date(); now.setHours(0,0,0,0);
  var startDay = new Date(DS); startDay.setHours(0,0,0,0);

  var baseDate = new Date(now); 

  var dayOfWeek = baseDate.getDay();
  var diffToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  var sow = new Date(baseDate);
  sow.setDate(baseDate.getDate() + diffToMonday);
  var daysInRing = 7;

  var currentDayIndex = Math.round((baseDate - sow) / 86400000);

  for (var i = 0; i < daysInRing; i++) {
      var d = new Date(sow); d.setDate(sow.getDate() + i);
      var isT = d.getTime() === baseDate.getTime();
      var diff = Math.round((d - startDay) / 86400000);

      var tasks = diff >= 0 && diff < TOTAL ? getAllTasksForDay(diff, d) : [];
      var isDone = tasks.length > 0 && tasks.every(t => !!DB[t.k]);

      var angle = (i * (360/daysInRing)) - 90;
      var rad = angle * Math.PI / 180;
      var R = 84;
      var x = 110 + R * Math.cos(rad);
      var y = 110 + R * Math.sin(rad);

      var dx = Math.cos(rad) * 26;
      var dy = Math.sin(rad) * 26;

      var node = document.createElement('div');
      node.className = 'day-node' + (isT ? ' active' : '') + (isDone ? ' done' : '');

      node.style.left = x + 'px';
      node.style.top = y + 'px';

      var dayNameIndex = (d.getDay() + 6) % 7; 
      node.innerHTML = `<span class="date-val">${d.getDate()}</span><span class="day-out" style="transform: translate(${dx}px, ${dy}px);">${DL[dayNameIndex]}</span>`;
      el.appendChild(node);
  }

  var wCirc = 2 * Math.PI * 84;
  var fillLength = (currentDayIndex / daysInRing) * wCirc;
  
  if (fillLength <= 0) fillLength = 0.01; 

  var ringWeek = document.getElementById('ringWeek');
  if(ringWeek) {
      ringWeek.style.strokeDasharray = wCirc;
      ringWeek.style.strokeDashoffset = wCirc - fillLength;
  }
}

function updateHeroStats(dc, tasks) {
  var woPct = tasks.length>0 ? Math.round((dc/tasks.length)*100) : 0;
  document.getElementById('sbFocus').innerHTML = woPct + '<span class="sb-unit">%</span>';
  
  var mCirc = 2 * Math.PI * 60; 
  var ringMiddle = document.getElementById('ringMiddle');
  ringMiddle.style.strokeDasharray = mCirc;
  ringMiddle.style.strokeDashoffset = mCirc * (1 - (woPct/100));
}

function getTimerInner(isR, s) { return isR?`<svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8zm.5-13H11v6l5.2 3.2.8-1.3-4.5-2.7V7z"/></svg> ${s}s <span class="cancel-timer-btn"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></span>`:`<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> ${s}s`; }

function startTimer(k, s, ev) {
  ev.stopPropagation(); if(pre) return;
  if(!globalAudioCtx){try{globalAudioCtx=new(window.AudioContext||window.webkitAudioContext)();globalAudioCtx.resume();}catch(e){}}else if(globalAudioCtx.state==='suspended')globalAudioCtx.resume();
  if(GT.key===k){cancelTimer(true);return;} if(GT.key)cancelTimer(true);
  GT.key=k; GT.end=Date.now()+s*1000; if(!gInterval)gInterval=setInterval(tickTimer,250);
  var b=document.getElementById('timer_'+k); if(b){b.classList.add('running');tickTimer();}
}
function cancelTimer(res) {
  var ok=GT.key; GT.key=null; GT.end=0; if(gInterval){clearInterval(gInterval);gInterval=null;}
  if(res&&ok){var b=document.getElementById('timer_'+ok);if(b){b.innerHTML=getTimerInner(false,b.getAttribute('data-sec'));b.classList.remove('running');}}
}
function tickTimer() {
  if(!GT.key)return; var left=Math.ceil((GT.end-Date.now())/1000), b=document.getElementById('timer_'+GT.key);
  if(left<=0){ var dk=GT.key;cancelTimer(false);playBeep(); var c=document.getElementById('card_'+dk);if(c&&!c.classList.contains('done'))toggleTask(c,dk,true); }
  else if(b) b.innerHTML=getTimerInner(true,left);
}
function playBeep() {
  if(!globalAudioCtx)return; try{ var o=globalAudioCtx.createOscillator(),g=globalAudioCtx.createGain();o.type='sine';o.frequency.setValueAtTime(880,globalAudioCtx.currentTime);g.gain.setValueAtTime(0.08,globalAudioCtx.currentTime);o.connect(g);g.connect(globalAudioCtx.destination);o.start();o.stop(globalAudioCtx.currentTime+0.3); }catch(e){}
}

function toggleTask(c, k, skip) {
  if(pre) return; 
  var was=!!DB[k]; if(was)delete DB[k];else{DB[k]=true;if(GT.key===k)cancelTimer(true);if(!skip&&navigator.vibrate)navigator.vibrate([30,50,30]);}
  save(); c.classList.toggle('done',!was);
  if(!was){var tb=c.querySelector('.wcard-timer');if(tb){tb.innerHTML=getTimerInner(false,tb.getAttribute('data-sec'));tb.classList.remove('running');}}
  
  var dObj = new Date(DS); dObj.setDate(dObj.getDate() + dI);
  var tasks=getAllTasksForDay(dI, dObj), dc=0; tasks.forEach(t=>{if(DB[t.k])dc++;});
  updateHeroStats(dc, tasks); checkAllDone(dc, tasks.length, was); renderDashboardBox(); drawWeek();
}

function checkAllDone(dc, t, was) {
  var b=document.getElementById('doneBanner');
  if(dc===t&&t>0){ 
      b.style.display='flex'; 
      if(!was){
          var cp = document.getElementById('crushedPopup');
          if(cp) {
              cp.classList.remove('show');
              void cp.offsetWidth;
              cp.classList.add('show');
              setTimeout(() => cp.classList.remove('show'), 4000);
          }
      }
  } else { b.style.display='none'; }
}

var AC = ['#E8622A','#2A8FE8','#00d26a','#D4860A','#7A4FCF', '#ff2a5f'];
function makeCard(t, done, idx) {
  var c = document.createElement('div'); c.id='card_'+t.k; c.className='wcard glass-panel'+(done?' done':''); c.style.animationDelay=(idx*0.04)+'s';
  c.style.setProperty('--accent-color', AC[idx%AC.length]); c.setAttribute('data-val', t.val);
  c.onclick = ev => { if(ev.target.closest('.wcard-timer'))return; toggleTask(c,t.k,false); };
  var tim = t.unit==='sec'?`<button id="timer_${t.k}" class="wcard-timer${GT.key===t.k?' running':''}" data-sec="${t.val}" onclick="startTimer('${t.k}',${t.val},event)">${getTimerInner(GT.key===t.k,GT.key===t.k?Math.max(0,Math.ceil((GT.end-Date.now())/1000)):t.val)}</button>`:'';
  
  c.innerHTML = `<div class="wcard-icon">${t.icon}</div><div class="wcard-body"><div class="wcard-tag">${t.tag||'WORKOUT'}</div><div class="wcard-name">${t.name}</div><div class="wcard-val">${t.disp}</div>${tim}</div><div class="chkbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`;
  return c;
}

function appendSection(w, ti, ts, si) {
  if(ts.length===0)return; var d=document.createElement('div'); d.className='sec-head'; d.innerHTML=`<span class="sec-title">${ti}</span><span class="sec-badge" style="font-size:11px; color:var(--tx3); font-weight:700;">${ts.length} exercises</span>`; w.appendChild(d); ts.forEach((t,i)=>w.appendChild(makeCard(t,!!DB[t.k],si+i)));
}

function renderToday() {
  var dObj = new Date(DS); dObj.setDate(dObj.getDate() + dI);
  var wTasks = getAllTasksForDay(dI, dObj);
  
  // REMOVED DATE NUMBER, KEPT ONLY DAY NAME
  var now = new Date();
  document.getElementById('heroDayName').textContent = DL_FULL[now.getDay()];
  
  var pb = document.getElementById('previewBannerWrap');
  if (pre) {
    pb.innerHTML = `<div class="pre-label glass-panel" style="padding: 16px; text-align: center; border-radius: var(--r-md); margin-bottom: 24px; border: 1px solid var(--cyan); box-shadow: 0 0 15px rgba(0,208,244,0.15);">
       <span style="font-family: var(--font-head); font-weight: 800; font-size: 14px; color: var(--cyan); letter-spacing: 0.5px; text-transform: uppercase;">Challenge Ignites Tomorrow</span><br>
       <small style="font-size:12px;font-weight:700;color:var(--tx2); margin-top:4px; display:inline-block;">Here is your Day 1 preview. Rest up.</small>
    </div>`;
  } else {
    pb.innerHTML = '';
  }
  
  var groupOrder = ['WARMUP', 'LOWER BODY', 'UPPER BODY', 'ARMS', 'CORE', 'FINISHER'];
  var groups = {};
  groupOrder.forEach(key => groups[key] = []);

  wTasks.forEach(function(t) { 
      if (groups[t.tag]) { groups[t.tag].push(t); } 
      else { groups[t.tag] = [t]; if(!groupOrder.includes(t.tag)) groupOrder.push(t.tag); }
  });

  var doneCount = wTasks.filter(t=>!!DB[t.k]).length;
  updateHeroStats(doneCount, wTasks); checkAllDone(doneCount, wTasks.length, true); renderDashboardBox(); drawWeek();
  
  var wrap = document.getElementById('todayContent'); wrap.innerHTML = '';
  var runningIdx = 0;
  groupOrder.forEach(key => {
      if(groups[key] && groups[key].length > 0) {
          appendSection(wrap, key, groups[key], runningIdx);
          runningIdx += groups[key].length;
      }
  });
}

function renderProg() {
  var fd=0, sc=W_DATA.map(x=>({k:x.k, i:x.i, n:x.n, c:AC[W_DATA.indexOf(x)%AC.length], cnt:0, val:0}));
  for(var i=0; i<TOTAL; i++){ 
    var dObj = new Date(DS); dObj.setDate(dObj.getDate() + i);
    var ts=getAllTasksForDay(i, dObj); 
    if(ts.length>0&&ts.every(x=>!!DB[x.k]))fd++; 
    ts.forEach(t=>{ var s=sc.find(x=>x.k===t.k.split('_')[0]); if(s){s.val++; if(DB[t.k])s.cnt++;} }); 
  }
  var ov=Math.round(fd/TOTAL*100); sc=sc.filter(s=>s.val>0);
  var cards = sc.map(s=>{ var p=Math.round(s.cnt/s.val*100), a=2*Math.PI*36; return `<div class="subj-card glass-panel" onclick="openDetail('${s.k}')">
    <div class="subj-icon-wrap">${s.i}</div><div class="ring-wrap">
      <svg width="76" height="76" viewBox="0 0 86 86"><defs><linearGradient id="g_${s.k}" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="${s.c}"/><stop offset="100%" stop-color="var(--gold)"/></linearGradient></defs>
        <circle cx="43" cy="43" r="36" fill="none" stroke="var(--border2)" stroke-width="7"/><circle cx="43" cy="43" r="36" fill="none" stroke="url(#g_${s.k})" stroke-width="7" stroke-linecap="round" stroke-dasharray="${a.toFixed(2)}" stroke-dashoffset="${(a*(1-p/100)).toFixed(2)}" id="p_${s.k}" style="transition:stroke-dashoffset 1s ease; transform-origin:43px 43px"/>
      </svg>
    </div><div class="subj-name" style="color:${s.c}">${s.n}</div>
  </div>`}).join('');
  
  document.getElementById('vP').innerHTML = `<div class="prog-hero glass-panel"><div class="prog-hero-row"><div class="prog-pct">${ov}%</div><div><div class="prog-meta-val">${fd} / ${TOTAL}</div><div class="prog-meta-lbl">Days Done</div></div></div><div class="prog-track"><div class="prog-fill" style="width:${ov}%"></div></div></div><div class="sec-head"><span class="sec-title">Mastery</span></div><div class="subj-grid">${cards}</div>`;
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{ var pf=document.querySelector('.prog-fill'); if(pf)pf.style.width=ov+'%'; });});
}

function openDetail(k) { 
  detKey=k; var s=W_DATA.find(x=>x.k===k); if(!s)return; 
  document.getElementById('vP').classList.remove('active'); document.getElementById('vD').classList.add('active'); 
  document.getElementById('btnBack').classList.add('on'); document.getElementById('miniTitle').innerHTML=s.i+' '+s.n; 
  document.getElementById('detStop1').setAttribute('stop-color', AC[W_DATA.indexOf(s)%AC.length]); document.getElementById('detStop2').setAttribute('stop-color', 'var(--gold)');
  renderDetail(true); 
}
function closeDetail() { switchTab(1); document.getElementById('miniTitle').textContent=''; }

function renderDetail(doScroll) {
  var s=W_DATA.find(x=>x.k===detKey), w=document.getElementById('detailList'); w.innerHTML=''; 
  var todayTime = new Date(); todayTime.setHours(0,0,0,0);
  var nowTime = todayTime.getTime();
  var cnt=0, val=0, st=null;

  for(var i=0;i<TOTAL;i++){ 
    var d=new Date(DS); d.setDate(d.getDate()+i); 
    var isT = d.getTime() === nowTime; 
    var isF = d.getTime() > nowTime; 
    var ts=getAllTasksForDay(i, d).filter(t=>t.k.startsWith(s.k+'_')); 
    if(ts.length===0)continue; val++; var ad=ts.every(t=>!!DB[t.k]); if(ad)cnt++;
    
    var c=document.createElement('div'); c.className='day-card glass-panel'+(ad?' done':'')+(isT?' today-card':'');
    (function(rt,a,f){c.onclick=()=>{if(f)return;rt.forEach(t=>{if(a)delete DB[t.k];else DB[t.k]=true;});save();renderDetail(false);};})(ts,ad,isF);
    c.innerHTML=`<div class="day-num-block"><span class="day-num">${d.getDate()}</span><span class="day-mon">${MN[d.getMonth()]}</span></div><div class="day-info" style="font-size:12px; color:var(--tx2);">${ts.map(x=>x.disp).join(', ')}</div>${isF&&!ad?'<div class="soon-pill" style="font-size:10px; font-weight:700; color:var(--tx3); text-transform:uppercase;">Soon</div>':`<div class="day-chk${ad?' on':''}" style="margin-left:auto; width:24px; height:24px; border-radius:50%; border:2px solid var(--border2); display:flex; align-items:center; justify-content:center; background:${ad?'var(--green)':'transparent'}; border-color:${ad?'var(--green)':'var(--border2)'};"><svg viewBox="0 0 24 24" style="width:14px; height:14px; stroke:#000; stroke-width:3; fill:none; opacity:${ad?'1':'0'};"><polyline points="20 6 9 17 4 12"/></svg></div>`}`;
    w.appendChild(c); if(isT)st=c;
  }
  document.getElementById('detailRingArc').style.strokeDashoffset=477.52*(1-(val>0?cnt/val:0)); document.getElementById('detailCnt').textContent=cnt; document.getElementById('detailDone').textContent=cnt; document.getElementById('detailTotal').textContent=val;
  if(doScroll&&st)setTimeout(()=>st.scrollIntoView({behavior:'smooth',block:'center'}),360);
}

function switchTab(i) {
  document.getElementById('mainScroll').scrollTop=0; 
  ['vT','vP','vD'].forEach(x=>document.getElementById(x).classList.remove('active')); ['t0','t1'].forEach(x=>document.getElementById(x).classList.remove('active'));
  document.getElementById('btnBack').classList.remove('on'); document.getElementById('miniTitle').textContent=''; 
  
  if(i===0){document.getElementById('vT').classList.add('active');document.getElementById('t0').classList.add('active');renderToday();}
  else if(i===1){document.getElementById('vP').classList.add('active');document.getElementById('t1').classList.add('active');renderProg();}
}

document.addEventListener('visibilitychange', ()=>{if(document.visibilityState==='visible'){init();if(document.getElementById('vT').classList.contains('active'))renderToday();else if(document.getElementById('vP').classList.contains('active'))renderProg();}});

init(); 
switchTab(0);
startLiveCountdown(); 
</script>
</body>
</html>
